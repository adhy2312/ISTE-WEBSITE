name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma_password
          POSTGRES_DB: iste_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Root cause fix: Next-Auth v5 crashes on startup without AUTH_SECRET.
      # A random CI-only secret is generated so the app starts cleanly.
      AUTH_SECRET: "ci-playwright-secret-${{ github.run_id }}-${{ github.run_attempt }}"
      NEXTAUTH_SECRET: "ci-playwright-secret-${{ github.run_id }}-${{ github.run_attempt }}"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/iste_test?schema=public"
      # Suppress Next.js telemetry in CI
      NEXT_TELEMETRY_DISABLED: "1"
      # Skip environment validation during test — missing Sanity tokens are OK
      SKIP_ENV_VALIDATION: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        # Use npm install (not ci) to match the dependency resolution that passed on run #26.
        # npm ci is stricter about lockfile integrity and can fail on version drift.
        run: npm install

      - name: Install Playwright Browsers
        # Install ALL browsers with deps — matches run #26 which used full install and passed.
        # Chromium-only installs can still miss shared system libs needed even for chromium.
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        # Run all configured projects (chromium + mobile safari if configured).
        # The playwright.config.ts webServer block will spin up `npm run dev` automatically.
        # SKIP_ENV_VALIDATION prevents startup crashes when Sanity/DB secrets are absent.
        run: npx playwright test
        env:
          SKIP_ENV_VALIDATION: "1"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
